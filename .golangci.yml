# CodeMind Go Linter 配置
# 基于 golangci-lint 官方推荐配置

# 运行配置
run:
  # 运行超时时间
  timeout: 5m
  # 包含的测试文件
  tests: true
  # 并行数
  concurrency: 4
  # Go 版本
  go: "1.23"
  # 构建标签
  build-tags:
    - integration

# 输出配置
output:
  # 打印检查的 linter
  print-linter-name: true

# Linter 配置
linters:
  disable-all: true
  enable:
    # Bug 检测
    - errcheck        # 检查未处理的错误
    - gosimple        # 简化代码
    - govet           # go vet 分析
    - ineffassign     # 检查无效赋值
    - staticcheck     # 静态分析
    - typecheck       # 类型检查
    - unused          # 检查未使用的常量、变量、函数和类型

    # 代码质量
    - goconst         # 检测可以转换为常量的字符串
    - gocritic        # 代码质量检查
    - gofmt           # 代码格式化检查
    - goimports       # import 序检查和格式化
    - mnd             # 魔法数字检测 (原 gomnd)
    - misspell        # 拼写检查

    # 性能
    - prealloc        # 检测可以预分配的 slice

    # 风格
    - gocyclo         # 圈复杂度检查
    - godot           # 注释应以句号结尾
    - gofumpt         # 更严格的 gofmt
    - revive          # 代码风格检查 (替代 golint)
    - unconvert       # 检测不必要的类型转换
    - unparam         # 检测未使用的函数参数

linters-settings:
  govet:
    enable-all: true

  gocyclo:
    # 最小圈复杂度
    min-complexity: 15

  goconst:
    # 最小字符串长度
    min-len: 3
    # 最小出现次数
    min-occurrences: 3

  mnd:
    # 魔法数字检查
    checks:
      - argument
      - case
      - condition
      - operation
      - return
      - assign

  revive:
    # 启用的规则
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: if-return
      - name: increment-decrement
      - name: var-naming
        severity: warning
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
      - name: unreachable-code
      - name: redefines-builtin-id

  misspell:
    # 区域设置
    locale: US

# Issues 配置
issues:
  # 显示所有问题
  max-issues-per-linter: 0
  max-same-issues: 0

  # 排除规则
  exclude-rules:
    # 测试文件允许更宽松的规则
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - gosec
        - goconst

    # main 函数允许未使用的返回值
    - path: cmd/
      text: "unresolved.*type"
      linters:
        - unused

  # 排除默认的 exclude 列表
  exclude-use-default: false

# 速度配置
# 性能优化
