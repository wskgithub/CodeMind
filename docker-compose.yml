version: "3.8"

services:
  # ──────────────────────────────────
  # Frontend (Nginx + React SPA)
  # ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codemind-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./deploy/docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - codemind-network
    restart: unless-stopped

  # ──────────────────────────────────
  # Backend (Go API Server)
  # ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codemind-backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-codemind}
      - DB_USER=${DB_USER:-codemind}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - LLM_BASE_URL=${LLM_BASE_URL:?LLM_BASE_URL is required}
      - LLM_API_KEY=${LLM_API_KEY:-}
    volumes:
      - ./deploy/config:/app/config:ro
    networks:
      - codemind-network
    restart: unless-stopped

  # ──────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: codemind-postgres
    ports:
      - "${DB_EXTERNAL_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-codemind}
      POSTGRES_USER: ${DB_USER:-codemind}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./deploy/docker/postgres/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-codemind} -d ${DB_NAME:-codemind}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - codemind-network
    restart: unless-stopped

  # ──────────────────────────────────
  # Redis Cache
  # ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: codemind-redis
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD:-}"
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - codemind-network
    restart: unless-stopped

# ──────────────────────────────────
# Volumes
# ──────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ──────────────────────────────────
# Networks
# ──────────────────────────────────
networks:
  codemind-network:
    driver: bridge
